# Release pipeline — aligned with NautilusTrader's build.yml release path.
#
# Flow: bump `version` in BOTH pyproject.toml and Cargo.toml -> merge to `main`.
#   1. tag-release: verify the two versions match, then create `vX.Y.Z` if this version
#      has no tag yet (self-bootstraps the first release), and open a GitHub Release.
#   2. build-{linux,macos,windows}: 9 wheels via maturin (3 OS x py3.12/3.13/3.14).
#   3. build-sdist.
#   4. github-release-assets: attach wheels + sdist to the Release.
#   5. publish-pypi:   PyPI Trusted Publishing (OIDC + attestations) — gated on var PYPI_PUBLISH.
#   6. publish-crates: crates.io Trusted Publishing (OIDC)            — gated on var CRATES_PUBLISH.
# See RELEASING.md for the one-time PyPI / crates.io setup and the publish toggles.
#
# NOTE: all third-party actions are pinned to commit SHAs, except dtolnay/rust-toolchain@1.96.0
# (its tag selects the Rust toolchain version).

name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push tag + create release
    outputs:
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true # the tag step pushes vX.Y.Z with this token
      - name: Verify pyproject and Cargo versions match
        run: |
          PY=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          CG=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "pyproject=$PY cargo=$CG"
          if [ "$PY" != "$CG" ]; then
            echo "::error::version mismatch — pyproject=$PY cargo=$CG (bump both)"; exit 1
          fi
          echo "VERSION=$PY" >> "$GITHUB_ENV"
      - name: Create tag if this version has none yet
        id: detect
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "tag v${VERSION} already exists — nothing to release"
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "created and pushed tag v${VERSION}"
          fi
      - name: Create GitHub Release
        if: steps.detect.outputs.tag
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.detect.outputs.tag }}
          generate_release_notes: true

  build-linux:
    needs: tag-release
    if: needs.tag-release.outputs.tag != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build manylinux wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --out dist -i python${{ matrix.python }}
          manylinux: auto
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-linux-${{ matrix.python }}
          path: dist/*.whl

  build-macos:
    needs: tag-release
    if: needs.tag-release.outputs.tag != ''
    runs-on: macos-latest # arm64
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build macOS wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --out dist -i python${{ matrix.python }}
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-macos-${{ matrix.python }}
          path: dist/*.whl

  build-windows:
    needs: tag-release
    if: needs.tag-release.outputs.tag != ''
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build Windows wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --out dist -i python${{ matrix.python }}
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: wheels-windows-${{ matrix.python }}
          path: dist/*.whl

  build-sdist:
    needs: tag-release
    if: needs.tag-release.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: sdist
          path: dist/*.tar.gz

  github-release-assets:
    needs: [tag-release, build-linux, build-macos, build-windows, build-sdist]
    if: needs.tag-release.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          pattern: "wheels-*"
          merge-multiple: true
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          pattern: sdist
          merge-multiple: true
      - name: Attach wheels + sdist to the Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.tag-release.outputs.tag }}
          files: dist/*

  publish-pypi:
    needs: [tag-release, build-linux, build-macos, build-windows, build-sdist]
    if: needs.tag-release.outputs.tag != '' && vars.PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC) + attestations
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          pattern: "wheels-*"
          merge-multiple: true
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          path: dist
          pattern: sdist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true

  publish-crates:
    needs: [tag-release, build-linux, build-macos, build-windows, build-sdist]
    if: needs.tag-release.outputs.tag != '' && vars.CRATES_PUBLISH == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # crates.io Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Authenticate to crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
      - name: Publish crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
